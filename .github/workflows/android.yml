name: Compilar APK Android - FinaPro

on:
  push:
    branches:
      - main

env:
  CAPACITOR_TELEMETRY_DISABLED: 1  # Desactiva preguntas interactivas en el servidor

jobs:
  build:
    name: Build APK de Producción
    runs-on: ubuntu-latest

    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependencias de Compilación
        run: |
          npm install --legacy-peer-deps

      - name: Auto-aceptar Licencias de Android SDK
        run: |
          yes | sdkmanager --licenses || true

      - name: Agregar Plataforma Android
        run: |
          npx cap add android || npx cap sync android

      - name: Sincronizar Recursos Web con Android
        run: |
          npx cap sync

      - name: Otorgar Permisos de Ejecución Gradle
        run: chmod +x android/gradlew

      - name: Compilar archivo APK debuggable
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Guardar y Exponer APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: FinaPro-Fashion-Instalador
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
