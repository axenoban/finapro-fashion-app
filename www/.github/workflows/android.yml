```yaml
name: Compilar APK Android - FinaPro

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK de Producción
    runs-on: ubuntu-latest

    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v3

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar Dependencias de Compilación
        run: |
          npm install
          npx cap add android

      - name: Sincronizar Recursos Web con Android
        run: npx cap sync

      - name: Otorgar Permisos de Ejecución Gradle
        run: chmod +x android/gradlew

      - name: Compilar archivo APK debuggable
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Guardar y Exponer APK Terminado
        uses: actions/upload-artifact@v3
        with:
          name: FinaPro-Fashion-Instalador
          path: android/app/build/outputs/apk/debug/app-debug.apk

```
